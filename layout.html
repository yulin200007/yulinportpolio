  $(document).ready(function () {
  $(".masonry").masonry({
    itemSelector: ".masonry-item", //單一卡片
    columnWidth: ".masonry-item", //控制卡片寬度
    percentPosition: true, //定位使用百分比
    horizontalOrder: true, //第二列開始的順序左至右，沒有設會是隨機順序
    transitionDuration: '0.2s', //變換位置時的過場時間
  });
});
